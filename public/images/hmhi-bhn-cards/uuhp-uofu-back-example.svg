<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">UUHP card back placeholder</title>
  <desc id="desc">Placeholder de-identified UUHP card image for BHN callouts.</desc>
  <rect width="1600" height="1000" fill="#f8fafc"/>
  <rect x="80" y="80" width="1440" height="840" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="8"/>

  <rect x="120" y="120" width="1360" height="130" rx="14" fill="#0f766e"/>
  <text x="160" y="205" font-size="58" font-family="Arial, sans-serif" fill="#ffffff">University of Utah Health Plans (UUHP)</text>

  <rect x="120" y="300" width="560" height="220" rx="16" fill="#ecfeff" stroke="#0f766e" stroke-width="4"/>
  <text x="155" y="365" font-size="40" font-family="Arial, sans-serif" fill="#134e4a">Medical Plan Information</text>
  <text x="155" y="430" font-size="34" font-family="Arial, sans-serif" fill="#134e4a">Member ID: XXX-XXXXXX</text>
  <text x="155" y="485" font-size="34" font-family="Arial, sans-serif" fill="#134e4a">Group: Employee + Dependents</text>

  <rect x="760" y="300" width="680" height="320" rx="16" fill="#fef3c7" stroke="#f59e0b" stroke-width="4"/>
  <text x="800" y="365" font-size="44" font-family="Arial, sans-serif" fill="#92400e">Mental Health / BHN</text>
  <text x="800" y="430" font-size="42" font-family="Arial, sans-serif" fill="#92400e">Check HMHI BHN indicator</text>
  <text x="800" y="490" font-size="32" font-family="Arial, sans-serif" fill="#92400e">Network rules can differ from</text>
  <text x="800" y="540" font-size="32" font-family="Arial, sans-serif" fill="#92400e">medical network participation.</text>

  <rect x="120" y="670" width="1320" height="200" rx="16" fill="#f1f5f9" stroke="#94a3b8" stroke-width="3"/>
  <text x="160" y="735" font-size="34" font-family="Arial, sans-serif" fill="#0f172a">Customer support and claims instructions</text>
  <text x="160" y="785" font-size="30" font-family="Arial, sans-serif" fill="#334155">Ask who administers outpatient behavioral health for your plan.</text>
  <text x="160" y="835" font-size="30" font-family="Arial, sans-serif" fill="#334155">Then confirm provider NPI and billing tax ID are in-network.</text>
</svg>
